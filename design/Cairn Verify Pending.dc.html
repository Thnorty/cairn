<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&amp;family=Work+Sans:wght@400;450;500;600&amp;display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  a { color: #6e8156; text-decoration: none; }
  a:hover { color: #5a6b44; }
</style>
</helmet>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:44px 24px;font-family:'Work Sans',system-ui,sans-serif;background:#e0d6c5;background-image:radial-gradient(120% 80% at 50% -10%, rgba(140,120,95,.14), transparent 55%), repeating-radial-gradient(circle at 76% 8%, transparent 0 30px, rgba(90,78,58,.045) 30px 31px);">

  <!-- ===== DEVICE ===== -->
  <div style="width:392px;height:846px;background:#26231e;border-radius:56px;padding:11px;box-shadow:0 2px 3px rgba(255,255,255,.12) inset, 0 40px 70px -30px rgba(45,38,26,.6), 0 18px 34px -18px rgba(45,38,26,.4);position:relative;">

    <!-- ===== SCREEN ===== -->
    <div style="width:100%;height:100%;border-radius:46px;overflow:hidden;position:relative;display:flex;flex-direction:column;background:#e9e1d3;background-image:radial-gradient(130% 50% at 50% -8%, rgba(150,131,104,.24), transparent 62%), radial-gradient(90% 40% at 100% 0%, rgba(150,131,104,.16), transparent 65%);">

      <!-- topographic contour wash -->
      <div style="position:absolute;inset:0;pointer-events:none;opacity:.5;background-image:repeating-radial-gradient(circle at 50% -6%, transparent 0 26px, rgba(90,78,58,.05) 26px 27px);"></div>

      <!-- status bar (signal dimmed — offline) -->
      <div style="position:relative;display:flex;align-items:center;justify-content:space-between;padding:16px 30px 4px;color:#33302b;font-weight:600;font-size:15px;letter-spacing:.3px;">
        <span>7:16</span>
        <div style="display:flex;align-items:center;gap:7px;">
          <div style="display:flex;align-items:flex-end;gap:2px;height:11px;">
            <div style="width:3px;height:5px;background:#c3b8a5;border-radius:1px;"></div>
            <div style="width:3px;height:7px;background:#c3b8a5;border-radius:1px;"></div>
            <div style="width:3px;height:9px;background:#c3b8a5;border-radius:1px;"></div>
            <div style="width:3px;height:11px;background:#c3b8a5;border-radius:1px;"></div>
          </div>
          <div style="width:16px;height:11px;border:1.5px solid #33302b;border-radius:3px;position:relative;padding:1.5px;"><div style="width:70%;height:100%;background:#33302b;border-radius:1px;"></div><div style="position:absolute;right:-3px;top:3px;width:2px;height:4px;background:#33302b;border-radius:0 1px 1px 0;"></div></div>
        </div>
      </div>

      <!-- header row -->
      <div style="position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 24px 0;">
        <div style="width:38px;height:38px;border-radius:50%;background:rgba(120,108,88,.14);display:flex;align-items:center;justify-content:center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4a453c" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"></path></svg>
        </div>
        <span style="font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#9c917e;">Verification</span>
        <div style="width:38px;"></div>
      </div>

      <!-- body -->
      <div style="position:relative;flex:1;overflow:hidden;padding:14px 24px 0;display:flex;flex-direction:column;align-items:center;">

        <!-- muted stone seal — waiting, not failed -->
        <div style="display:flex;flex-direction:column;align-items:center;text-align:center;">
          <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(155deg,#c3b49a,#a2937a);box-shadow:0 0 0 8px rgba(160,148,126,.16),0 10px 18px -8px rgba(90,80,60,.45),inset 0 1px 0 rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f4f0e6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"></circle><path d="M12 7v5l3.4 2.1"></path></svg>
          </div>
          <div style="font-family:'Zilla Slab',serif;font-weight:600;font-size:26px;color:#544b3b;margin-top:14px;line-height:1.12;max-width:270px;">Saved. We'll verify it soon.</div>
          <div style="font-size:13px;color:#6a6153;margin-top:6px;">Meditate 10 min · 7:16 AM</div>
        </div>

        <!-- proof photo pebble -->
        <div style="position:relative;width:100%;margin-top:18px;">
          <div style="width:100%;height:166px;border-radius:34px;overflow:hidden;position:relative;background-image:repeating-linear-gradient(135deg,#cfc6b4 0 14px,#c6bca9 14px 28px);box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 18px 26px -16px rgba(60,50,35,.5),0 5px 10px -5px rgba(60,50,35,.25);border:1px solid rgba(255,255,255,.35);">
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace;font-size:11px;color:#6b6252;letter-spacing:.5px;">proof photo</div>
            <!-- pending chip on photo -->
            <div style="position:absolute;top:12px;left:12px;display:inline-flex;align-items:center;gap:6px;background:rgba(38,35,30,.62);backdrop-filter:blur(3px);padding:5px 11px 5px 8px;border-radius:20px;">
              <span style="width:14px;height:14px;border-radius:50%;background:#c3b49a;display:flex;align-items:center;justify-content:center;">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#33302b" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"></circle><path d="M12 7.5v5l3.2 2"></path></svg>
              </span>
              <span style="font-size:11.5px;font-weight:600;color:#f2efe6;letter-spacing:.2px;">Awaiting verification</span>
            </div>
          </div>
        </div>

        <!-- offline reassurance line -->
        <div style="width:100%;margin-top:14px;display:flex;gap:11px;align-items:flex-start;background:rgba(120,108,88,.12);border-radius:22px;padding:14px 16px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8a7f6c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px;"><path d="M2 8.5C5 6 8.3 4.7 12 4.7c1.5 0 3 .2 4.3.6"></path><path d="M5 12c1.7-1.3 3.6-2.1 5.6-2.4"></path><path d="M8.2 15.4c1-.7 2.2-1.1 3.4-1.2"></path><circle cx="12" cy="19" r="0.6" fill="#8a7f6c"></circle><path d="M4 4l16 16" stroke="#8a7f6c"></path></svg>
          <div style="font-size:13px;line-height:1.5;color:#544d40;"><strong style="font-weight:600;color:#463f31;">No connection right now.</strong> Your proof is saved on this device — we'll verify it automatically the moment you're back online.</div>
        </div>

        <!-- streak-safe + held metres -->
        <div style="width:100%;margin-top:12px;display:flex;gap:10px;">
          <div style="flex:1;display:flex;align-items:center;gap:9px;background:linear-gradient(165deg,#f3eee3,#e6ddcc);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:12px 14px;box-shadow:0 1px 0 rgba(255,255,255,.6) inset;">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#7d8a5f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M13 2L5 13h6l-1 9 8-11h-6z"></path></svg>
            <div style="font-size:12px;line-height:1.3;color:#5a5346;"><strong style="font-weight:600;color:#3f3a2f;">Streak safe</strong><br>counts today</div>
          </div>
          <div style="flex:1;display:flex;align-items:center;gap:9px;background:linear-gradient(165deg,#f3eee3,#e6ddcc);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:12px 14px;box-shadow:0 1px 0 rgba(255,255,255,.6) inset;">
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex-shrink:0;width:20px;"><div style="width:8px;height:4px;border-radius:50%;background:#b7a98f;margin-bottom:-.5px;"></div><div style="width:14px;height:5px;border-radius:50%;background:#c8bba1;margin-bottom:-.5px;"></div><div style="width:19px;height:5px;border-radius:50%;background:#b7a98f;"></div></div>
            <div style="font-size:12px;line-height:1.3;color:#5a5346;"><strong style="font-weight:600;color:#3f3a2f;">13 m held</strong><br>lands on verify</div>
          </div>
        </div>

      </div>

      <!-- footer action -->
      <div style="position:relative;flex-shrink:0;padding:14px 24px 30px;background:linear-gradient(0deg,#e9e1d3 62%,rgba(233,225,211,0));">
        <button style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(155deg,#c07a54,#a6603d);color:#f6efe6;border:none;padding:17px;border-radius:26px;font-family:'Work Sans',sans-serif;font-weight:600;font-size:16px;cursor:pointer;box-shadow:0 10px 20px -8px rgba(140,74,42,.6),inset 0 1px 0 rgba(255,255,255,.3);">Back to Today</button>
      </div>

      <!-- home indicator -->
      <div style="position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:126px;height:5px;border-radius:3px;background:rgba(50,44,34,.35);"></div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:460,&quot;height&quot;:940}}"></script>
</body>
</html>
