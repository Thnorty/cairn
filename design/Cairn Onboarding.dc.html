<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&family=Work+Sans:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  a { color: #6e8156; text-decoration: none; }
  a:hover { color: #5a6b44; }
</style>
</helmet>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:44px 24px;font-family:'Work Sans',system-ui,sans-serif;background:#e0d6c5;background-image:radial-gradient(120% 80% at 50% -10%, rgba(140,120,95,.14), transparent 55%), repeating-radial-gradient(circle at 76% 8%, transparent 0 30px, rgba(90,78,58,.045) 30px 31px);">

  <div style="width:392px;height:846px;background:#26231e;border-radius:56px;padding:11px;box-shadow:0 2px 3px rgba(255,255,255,.12) inset, 0 40px 70px -30px rgba(45,38,26,.6), 0 18px 34px -18px rgba(45,38,26,.4);position:relative;">
    <div style="width:100%;height:100%;border-radius:46px;overflow:hidden;position:relative;display:flex;flex-direction:column;background:#e9e1d3;background-image:radial-gradient(135% 48% at 50% -6%, rgba(150,166,120,.26), transparent 62%),radial-gradient(90% 32% at 100% 4%, rgba(178,124,92,.14), transparent 60%);">

      <div style="position:absolute;inset:0;pointer-events:none;opacity:.5;background-image:repeating-radial-gradient(circle at 50% -4%, transparent 0 30px, rgba(90,100,72,.05) 30px 31px);"></div>

      <!-- status bar -->
      <div style="position:relative;display:flex;align-items:center;justify-content:space-between;padding:16px 30px 4px;color:#33302b;font-weight:600;font-size:15px;letter-spacing:.3px;">
        <span>7:10</span>
        <div style="display:flex;align-items:center;gap:7px;">
          <div style="display:flex;align-items:flex-end;gap:2px;height:11px;">
            <div style="width:3px;height:5px;background:#33302b;border-radius:1px;"></div>
            <div style="width:3px;height:7px;background:#33302b;border-radius:1px;"></div>
            <div style="width:3px;height:9px;background:#33302b;border-radius:1px;"></div>
            <div style="width:3px;height:11px;background:#33302b;border-radius:1px;"></div>
          </div>
          <div style="width:16px;height:11px;border:1.5px solid #33302b;border-radius:3px;position:relative;padding:1.5px;"><div style="width:70%;height:100%;background:#33302b;border-radius:1px;"></div><div style="position:absolute;right:-3px;top:3px;width:2px;height:4px;background:#33302b;border-radius:0 1px 1px 0;"></div></div>
        </div>
      </div>

      <!-- body -->
      <div style="position:relative;flex:1;overflow:hidden;padding:16px 30px 0;display:flex;flex-direction:column;">

        <!-- hero cairn -->
        <div style="display:flex;flex-direction:column;align-items:center;margin-top:14px;">
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;">
            <div style="width:26px;height:14px;border-radius:48% 52% 45% 55%/62% 58% 42% 38%;background:linear-gradient(158deg,#96a776,#6d8056);box-shadow:0 0 0 5px rgba(122,141,96,.16),inset 0 1px 0 rgba(255,255,255,.4),0 3px 5px rgba(70,88,50,.3);transform:rotate(-4deg);margin-bottom:-3px;"></div>
            <div style="width:38px;height:16px;border-radius:50% 50% 45% 55%/60% 58% 42% 40%;background:linear-gradient(158deg,#dcd5c7,#b6ad9c);box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 4px rgba(60,50,35,.18);transform:rotate(2deg);margin-bottom:-3px;"></div>
            <div style="width:46px;height:17px;border-radius:47% 53% 46% 54%/60% 55% 45% 40%;background:linear-gradient(158deg,#d6cfc0,#b1a796);box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 4px rgba(60,50,35,.18);transform:rotate(-3deg);margin-bottom:-3px;"></div>
            <div style="width:56px;height:18px;border-radius:49% 51% 45% 55%/60% 58% 42% 40%;background:linear-gradient(158deg,#ded7c9,#b5ac9b);box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 4px rgba(60,50,35,.18);transform:rotate(2deg);margin-bottom:-3px;"></div>
            <div style="width:66px;height:19px;border-radius:48% 52% 46% 54%/60% 55% 45% 40%;background:linear-gradient(158deg,#d4cdbd,#a99f8d);box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 4px rgba(60,50,35,.18);transform:rotate(-2deg);margin-bottom:-3px;"></div>
            <div style="width:76px;height:20px;border-radius:49% 51% 46% 54%/60% 55% 45% 40%;background:linear-gradient(158deg,#d8d1c2,#a99f8d);box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 4px rgba(60,50,35,.18);transform:rotate(1deg);"></div>
            <div style="width:82px;height:13px;border-radius:50%;background:radial-gradient(ellipse,rgba(50,42,30,.26),transparent 70%);margin-top:5px;filter:blur(.8px);"></div>
          </div>
        </div>

        <!-- headline -->
        <div style="text-align:center;margin-top:30px;">
          <div style="font-family:'Zilla Slab',serif;font-weight:700;font-size:32px;color:#2c2924;line-height:1.12;">Don't just check it off.<br><span style="color:#5f7a45;">Prove it.</span></div>
          <div style="font-size:14px;color:#5f5647;margin-top:12px;line-height:1.5;">Cairn turns real effort into something you can see grow — one verified stone at a time.</div>
        </div>

        <!-- steps -->
        <div style="margin-top:28px;display:flex;flex-direction:column;gap:12px;">
          <div style="display:flex;align-items:center;gap:14px;background:linear-gradient(165deg,#f3eee3,#e5ddcc);border-radius:22px;padding:14px 16px;border:1px solid rgba(255,255,255,.4);box-shadow:0 1px 0 rgba(255,255,255,.6) inset;">
            <span style="width:34px;height:34px;flex-shrink:0;border-radius:50%;background:#33302b;color:#f0ece1;display:flex;align-items:center;justify-content:center;font-family:'Zilla Slab',serif;font-weight:600;font-size:16px;">1</span>
            <div style="font-size:14.5px;color:#2c2924;"><strong style="font-weight:600;">Do the thing.</strong> <span style="color:#5f5647;">Your habit, in the real world.</span></div>
          </div>
          <div style="display:flex;align-items:center;gap:14px;background:linear-gradient(165deg,#f3eee3,#e5ddcc);border-radius:22px;padding:14px 16px;border:1px solid rgba(255,255,255,.4);box-shadow:0 1px 0 rgba(255,255,255,.6) inset;">
            <span style="width:34px;height:34px;flex-shrink:0;border-radius:50%;background:#33302b;color:#f0ece1;display:flex;align-items:center;justify-content:center;font-family:'Zilla Slab',serif;font-weight:600;font-size:16px;">2</span>
            <div style="font-size:14.5px;color:#2c2924;"><strong style="font-weight:600;">Snap a photo.</strong> <span style="color:#5f5647;">A quick proof of what you did.</span></div>
          </div>
          <div style="display:flex;align-items:center;gap:14px;background:rgba(122,141,96,.14);border-radius:22px;padding:14px 16px;border:1px solid rgba(122,141,96,.22);">
            <span style="width:34px;height:34px;flex-shrink:0;border-radius:50%;background:linear-gradient(155deg,#96a776,#6d8056);color:#f4f0e6;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.35);"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#f4f0e6" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.2 4.2L19 7"></path></svg></span>
            <div style="font-size:14.5px;color:#2c2924;"><strong style="font-weight:600;">AI verifies.</strong> <span style="color:#4f5e3c;">A stone settles on your cairn.</span></div>
          </div>
        </div>

      </div>

      <!-- footer -->
      <div style="position:relative;flex-shrink:0;padding:16px 30px 30px;display:flex;flex-direction:column;gap:10px;">
        <button style="width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:linear-gradient(155deg,#c07a54,#a6603d);color:#f6efe6;border:none;padding:17px;border-radius:26px;font-family:'Work Sans',sans-serif;font-weight:600;font-size:16px;cursor:pointer;box-shadow:0 10px 20px -8px rgba(140,74,42,.6),inset 0 1px 0 rgba(255,255,255,.3);">Start climbing</button>
        <button style="width:100%;background:transparent;color:#6a6153;border:none;padding:6px;font-family:'Work Sans',sans-serif;font-weight:600;font-size:14.5px;cursor:pointer;">I already have an account</button>
      </div>

      <div style="position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:126px;height:5px;border-radius:3px;background:rgba(50,44,34,.35);"></div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:460,&quot;height&quot;:940}}"></script>
</body>
</html>
