<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&amp;family=Work+Sans:wght@400;450;500;600&amp;display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  a { color: #6e8156; text-decoration: none; }
  a:hover { color: #5a6b44; }
</style>
</helmet>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:44px 24px;font-family:'Work Sans',system-ui,sans-serif;background:#e0d6c5;background-image:radial-gradient(120% 80% at 50% -10%, rgba(140,120,95,.14), transparent 55%), repeating-radial-gradient(circle at 76% 8%, transparent 0 30px, rgba(90,78,58,.045) 30px 31px);">

  <!-- ===== DEVICE ===== -->
  <div style="width:392px;height:846px;background:#26231e;border-radius:56px;padding:11px;box-shadow:0 2px 3px rgba(255,255,255,.12) inset, 0 40px 70px -30px rgba(45,38,26,.6), 0 18px 34px -18px rgba(45,38,26,.4);position:relative;">

    <!-- ===== SCREEN ===== -->
    <div style="width:100%;height:100%;border-radius:46px;overflow:hidden;position:relative;display:flex;flex-direction:column;background:#e9e1d3;background-image:radial-gradient(135% 54% at 50% -8%, rgba(150,166,120,.34), transparent 62%), radial-gradient(90% 40% at 100% 0%, rgba(150,131,104,.16), transparent 65%);">

      <!-- topographic contour wash -->
      <div style="position:absolute;inset:0;pointer-events:none;opacity:.5;background-image:repeating-radial-gradient(circle at 50% -6%, transparent 0 26px, rgba(90,110,72,.05) 26px 27px);"></div>

      <!-- status bar -->
      <div style="position:relative;display:flex;align-items:center;justify-content:space-between;padding:16px 30px 4px;color:#33302b;font-weight:600;font-size:15px;letter-spacing:.3px;">
        <span>7:16</span>
        <div style="display:flex;align-items:center;gap:7px;">
          <div style="display:flex;align-items:flex-end;gap:2px;height:11px;">
            <div style="width:3px;height:5px;background:#33302b;border-radius:1px;"></div>
            <div style="width:3px;height:7px;background:#33302b;border-radius:1px;"></div>
            <div style="width:3px;height:9px;background:#33302b;border-radius:1px;"></div>
            <div style="width:3px;height:11px;background:#33302b;border-radius:1px;"></div>
          </div>
          <div style="width:16px;height:11px;border:1.5px solid #33302b;border-radius:3px;position:relative;padding:1.5px;"><div style="width:70%;height:100%;background:#33302b;border-radius:1px;"></div><div style="position:absolute;right:-3px;top:3px;width:2px;height:4px;background:#33302b;border-radius:0 1px 1px 0;"></div></div>
        </div>
      </div>

      <!-- header row -->
      <div style="position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 24px 0;">
        <div style="width:38px;height:38px;border-radius:50%;background:rgba(120,108,88,.14);display:flex;align-items:center;justify-content:center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4a453c" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"></path></svg>
        </div>
        <span style="font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#5f7a45;">Cairn complete</span>
        <div style="width:38px;"></div>
      </div>

      <!-- body -->
      <div style="position:relative;flex:1;overflow:hidden;padding:12px 24px 0;display:flex;flex-direction:column;align-items:center;">

        <!-- verified confirmation (compact) -->
        <div style="display:flex;align-items:center;gap:9px;margin-top:4px;">
          <div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(155deg,#93a473,#6d8056);box-shadow:0 0 0 5px rgba(122,141,96,.16),inset 0 1px 0 rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f4f0e6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.2 4.2L19 7"></path></svg>
          </div>
          <span style="font-size:13px;color:#6a6153;"><strong style="color:#4c6138;font-weight:600;">Verified</strong> · Read 20 pages · 7:16 AM</span>
        </div>

        <!-- completed cairn hero -->
        <div style="position:relative;margin-top:26px;display:flex;flex-direction:column;align-items:center;">
          <!-- sage completion glow -->
          <div style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(122,141,96,.22),transparent 68%);"></div>
          <div style="position:relative;width:96px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;">
            <!-- capping stone (sage, freshly placed 10th) -->
            <div style="width:32px;height:15px;border-radius:48% 52% 45% 55%/62% 58% 42% 38%;background:linear-gradient(158deg,#96a776,#6d8056);box-shadow:0 0 0 5px rgba(122,141,96,.18),inset 0 1px 0 rgba(255,255,255,.4),0 4px 7px rgba(70,88,50,.4);transform:rotate(-3deg);margin-bottom:-2px;position:relative;z-index:2;"></div>
            <div style="width:44px;height:8px;border-radius:50%;background:radial-gradient(ellipse,rgba(60,70,40,.3),transparent 70%);margin-bottom:-5px;filter:blur(1px);"></div>
            <div style="width:42px;height:15px;border-radius:50% 50% 45% 55%/60% 58% 42% 40%;background:linear-gradient(158deg,#dcd5c7,#b6ad9c);box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 3px rgba(60,50,35,.16);transform:rotate(2deg);margin-bottom:-3px;"></div>
            <div style="width:48px;height:16px;border-radius:47% 53% 46% 54%/60% 55% 45% 40%;background:linear-gradient(158deg,#d6cfc0,#b1a796);box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 3px rgba(60,50,35,.16);transform:rotate(-2deg);margin-bottom:-3px;"></div>
            <div style="width:55px;height:17px;border-radius:49% 51% 45% 55%/60% 58% 42% 40%;background:linear-gradient(158deg,#ded7c9,#b5ac9b);box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 3px rgba(60,50,35,.16);transform:rotate(2deg);margin-bottom:-3px;"></div>
            <div style="width:62px;height:18px;border-radius:48% 52% 46% 54%/60% 55% 45% 40%;background:linear-gradient(158deg,#d4cdbd,#a99f8d);box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 3px rgba(60,50,35,.16);transform:rotate(-1deg);margin-bottom:-3px;"></div>
            <div style="width:70px;height:19px;border-radius:49% 51% 46% 54%/60% 55% 45% 40%;background:linear-gradient(158deg,#d8d1c2,#aea491);box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 2px 3px rgba(60,50,35,.16);transform:rotate(1deg);"></div>
            <div style="width:74px;height:12px;border-radius:50%;background:radial-gradient(ellipse,rgba(50,42,30,.26),transparent 70%);margin-top:4px;filter:blur(.6px);"></div>
          </div>
        </div>

        <!-- headline -->
        <div style="font-family:'Zilla Slab',serif;font-weight:700;font-size:28px;color:#4c6138;margin-top:20px;">Cairn 6 complete</div>
        <div style="font-size:13.5px;color:#6a6153;margin-top:4px;">Ten stones stacked and sealed.</div>

        <!-- bonus reveal -->
        <div style="margin-top:20px;display:inline-flex;align-items:center;gap:9px;background:linear-gradient(155deg,#c07a54,#a6603d);color:#f6efe6;padding:11px 18px 11px 14px;border-radius:20px;box-shadow:0 10px 20px -10px rgba(140,74,42,.6),inset 0 1px 0 rgba(255,255,255,.3);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f6efe6" stroke-width="2" stroke-linejoin="round"><path d="M3 19l5.5-9 3.5 5 2-3 6.5 7z"></path></svg>
          <span style="font-size:16px;font-weight:600;">+25 m</span>
          <span style="font-size:13px;opacity:.9;font-weight:500;">cairn bonus</span>
        </div>

        <!-- teaching line -->
        <div style="width:100%;margin-top:22px;display:flex;gap:10px;align-items:flex-start;background:rgba(122,141,96,.13);border-radius:22px;padding:14px 16px;">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#5f7a45" stroke-width="2" style="flex-shrink:0;margin-top:1px;"><circle cx="12" cy="12" r="9"></circle><path d="M12 11v5" stroke-linecap="round"></path><circle cx="12" cy="7.6" r="0.4" fill="#5f7a45"></circle></svg>
          <div style="font-size:13px;line-height:1.5;color:#4f5e3c;">Every 10 stones caps a cairn and earns a bonus. <strong style="font-weight:600;color:#42552c;">Cairn 7 starts with your next stone.</strong></div>
        </div>

      </div>

      <!-- footer action -->
      <div style="position:relative;flex-shrink:0;padding:14px 24px 30px;background:linear-gradient(0deg,#e9e1d3 62%,rgba(233,225,211,0));">
        <button style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(155deg,#c07a54,#a6603d);color:#f6efe6;border:none;padding:17px;border-radius:26px;font-family:'Work Sans',sans-serif;font-weight:600;font-size:16px;cursor:pointer;box-shadow:0 10px 20px -8px rgba(140,74,42,.6),inset 0 1px 0 rgba(255,255,255,.3);">Done</button>
      </div>

      <!-- home indicator -->
      <div style="position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:126px;height:5px;border-radius:3px;background:rgba(50,44,34,.35);"></div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:460,&quot;height&quot;:940}}"></script>
</body>
</html>
