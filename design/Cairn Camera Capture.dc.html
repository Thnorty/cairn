<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&family=Work+Sans:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  a { color: #6e8156; text-decoration: none; }
  a:hover { color: #5a6b44; }
  @keyframes cairnPulse { 0%,100% { transform:scale(1); opacity:.55; } 50% { transform:scale(1.12); opacity:.9; } }
</style>
</helmet>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;gap:40px;flex-wrap:wrap;padding:44px 24px;font-family:'Work Sans',system-ui,sans-serif;background:#e0d6c5;background-image:radial-gradient(120% 80% at 50% -10%, rgba(140,120,95,.14), transparent 55%), repeating-radial-gradient(circle at 76% 8%, transparent 0 30px, rgba(90,78,58,.045) 30px 31px);">

  <!-- ===================== STATE 1 — CAPTURE ===================== -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
  <div style="width:392px;height:846px;background:#26231e;border-radius:56px;padding:11px;box-shadow:0 2px 3px rgba(255,255,255,.12) inset, 0 40px 70px -30px rgba(45,38,26,.6), 0 18px 34px -18px rgba(45,38,26,.4);position:relative;">
    <div style="width:100%;height:100%;border-radius:46px;overflow:hidden;position:relative;display:flex;flex-direction:column;background:#211d18;">

      <!-- viewfinder feed -->
      <div style="position:absolute;inset:0;background:linear-gradient(165deg,#3a4230,#2a2c22 45%,#20211b);background-image:radial-gradient(80% 50% at 30% 20%, rgba(150,166,120,.18), transparent 60%), radial-gradient(70% 45% at 80% 85%, rgba(120,90,60,.2), transparent 60%);"></div>
      <!-- faux book subject -->
      <div style="position:absolute;left:50%;top:47%;transform:translate(-50%,-50%) rotate(-4deg);width:210px;height:150px;border-radius:8px;background:linear-gradient(150deg,#e9e3d6,#cabfa8);box-shadow:0 30px 50px -18px rgba(0,0,0,.6);opacity:.9;">
        <div style="position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(90,78,58,.35);"></div>
        <div style="position:absolute;left:14px;right:52%;top:20px;height:5px;background:rgba(90,78,58,.2);border-radius:2px;"></div>
        <div style="position:absolute;left:14px;right:56%;top:34px;height:5px;background:rgba(90,78,58,.18);border-radius:2px;"></div>
        <div style="position:absolute;left:14px;right:60%;top:48px;height:5px;background:rgba(90,78,58,.16);border-radius:2px;"></div>
        <div style="position:absolute;left:53%;right:14px;top:20px;height:5px;background:rgba(90,78,58,.2);border-radius:2px;"></div>
        <div style="position:absolute;left:53%;right:18px;top:34px;height:5px;background:rgba(90,78,58,.18);border-radius:2px;"></div>
      </div>
      <!-- vignette -->
      <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(120% 90% at 50% 45%, transparent 55%, rgba(0,0,0,.42));"></div>

      <!-- status bar (light) -->
      <div style="position:relative;display:flex;align-items:center;justify-content:space-between;padding:16px 30px 4px;color:#f2ede2;font-weight:600;font-size:15px;letter-spacing:.3px;text-shadow:0 1px 3px rgba(0,0,0,.4);">
        <span>7:15</span>
        <div style="display:flex;align-items:center;gap:7px;">
          <div style="display:flex;align-items:flex-end;gap:2px;height:11px;">
            <div style="width:3px;height:5px;background:#f2ede2;border-radius:1px;"></div>
            <div style="width:3px;height:7px;background:#f2ede2;border-radius:1px;"></div>
            <div style="width:3px;height:9px;background:#f2ede2;border-radius:1px;"></div>
            <div style="width:3px;height:11px;background:#f2ede2;border-radius:1px;"></div>
          </div>
          <div style="width:16px;height:11px;border:1.5px solid #f2ede2;border-radius:3px;position:relative;padding:1.5px;"><div style="width:70%;height:100%;background:#f2ede2;border-radius:1px;"></div><div style="position:absolute;right:-3px;top:3px;width:2px;height:4px;background:#f2ede2;border-radius:0 1px 1px 0;"></div></div>
        </div>
      </div>

      <!-- top bar: close + task reminder -->
      <div style="position:relative;display:flex;align-items:center;justify-content:space-between;padding:10px 20px 0;">
        <div style="width:40px;height:40px;border-radius:50%;background:rgba(20,18,14,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f2ede2" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"></path></svg>
        </div>
        <div style="width:40px;"></div>
      </div>

      <!-- task reminder pill -->
      <div style="position:relative;display:flex;justify-content:center;margin-top:12px;">
        <div style="display:inline-flex;flex-direction:column;align-items:center;gap:3px;background:rgba(20,18,14,.42);backdrop-filter:blur(6px);padding:10px 20px;border-radius:22px;border:1px solid rgba(255,255,255,.1);">
          <span style="font-size:10.5px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#c2cdae;">Proving</span>
          <span style="font-family:'Zilla Slab',serif;font-weight:600;font-size:19px;color:#f4f0e6;line-height:1;">Read 20 pages</span>
        </div>
      </div>

      <!-- framing corners -->
      <div style="position:absolute;left:40px;right:40px;top:150px;bottom:210px;pointer-events:none;">
        <div style="position:absolute;top:0;left:0;width:26px;height:26px;border-top:2.5px solid rgba(244,240,230,.7);border-left:2.5px solid rgba(244,240,230,.7);border-radius:10px 0 0 0;"></div>
        <div style="position:absolute;top:0;right:0;width:26px;height:26px;border-top:2.5px solid rgba(244,240,230,.7);border-right:2.5px solid rgba(244,240,230,.7);border-radius:0 10px 0 0;"></div>
        <div style="position:absolute;bottom:0;left:0;width:26px;height:26px;border-bottom:2.5px solid rgba(244,240,230,.7);border-left:2.5px solid rgba(244,240,230,.7);border-radius:0 0 0 10px;"></div>
        <div style="position:absolute;bottom:0;right:0;width:26px;height:26px;border-bottom:2.5px solid rgba(244,240,230,.7);border-right:2.5px solid rgba(244,240,230,.7);border-radius:0 0 10px 0;"></div>
      </div>

      <!-- bottom controls -->
      <div style="position:absolute;left:0;right:0;bottom:0;padding:0 34px 34px;display:flex;align-items:center;justify-content:space-between;">
        <!-- gallery -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;width:62px;">
          <div style="width:52px;height:52px;border-radius:16px;background:rgba(40,36,28,.5);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f2ede2" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="3"></rect><circle cx="8.5" cy="9.5" r="1.6"></circle><path d="M3.5 17l5-4.5 4 3.5 3-2.5 5 4.5"></path></svg>
          </div>
          <span style="font-size:11px;font-weight:500;color:#e4dece;">Gallery</span>
        </div>
        <!-- shutter -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="width:82px;height:82px;border-radius:50%;padding:5px;background:rgba(244,240,230,.28);box-shadow:0 8px 20px -6px rgba(0,0,0,.5);">
            <div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(155deg,#c07a54,#a6603d);box-shadow:inset 0 2px 0 rgba(255,255,255,.35),inset 0 -3px 6px rgba(90,40,20,.4);"></div>
          </div>
        </div>
        <!-- flip camera -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;width:62px;">
          <div style="width:52px;height:52px;border-radius:16px;background:rgba(40,36,28,.5);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;">
            <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#f2ede2" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 13.5-4L20 6"></path><path d="M20 4v3.5h-3.5"></path><path d="M20 16a8 8 0 0 1-13.5 4L4 18"></path><path d="M4 20v-3.5h3.5"></path></svg>
          </div>
          <span style="font-size:11px;font-weight:500;color:#e4dece;">Flip</span>
        </div>
      </div>

      <div style="position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:126px;height:5px;border-radius:3px;background:rgba(244,240,230,.4);"></div>
    </div>
  </div>
  <span style="font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#9c917e;">Capture</span>
  </div>

  <!-- ===================== STATE 2 — VERIFYING ===================== -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
  <div style="width:392px;height:846px;background:#26231e;border-radius:56px;padding:11px;box-shadow:0 2px 3px rgba(255,255,255,.12) inset, 0 40px 70px -30px rgba(45,38,26,.6), 0 18px 34px -18px rgba(45,38,26,.4);position:relative;">
    <div style="width:100%;height:100%;border-radius:46px;overflow:hidden;position:relative;display:flex;flex-direction:column;background:#211d18;">

      <!-- captured photo (dimmed) -->
      <div style="position:absolute;inset:0;background:linear-gradient(165deg,#3a4230,#2a2c22 45%,#20211b);background-image:radial-gradient(80% 50% at 30% 20%, rgba(150,166,120,.18), transparent 60%), radial-gradient(70% 45% at 80% 85%, rgba(120,90,60,.2), transparent 60%);"></div>
      <div style="position:absolute;left:50%;top:47%;transform:translate(-50%,-50%) rotate(-4deg);width:210px;height:150px;border-radius:8px;background:linear-gradient(150deg,#e9e3d6,#cabfa8);box-shadow:0 30px 50px -18px rgba(0,0,0,.6);opacity:.9;">
        <div style="position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(90,78,58,.35);"></div>
        <div style="position:absolute;left:14px;right:52%;top:20px;height:5px;background:rgba(90,78,58,.2);border-radius:2px;"></div>
        <div style="position:absolute;left:14px;right:56%;top:34px;height:5px;background:rgba(90,78,58,.18);border-radius:2px;"></div>
        <div style="position:absolute;left:53%;right:14px;top:20px;height:5px;background:rgba(90,78,58,.2);border-radius:2px;"></div>
        <div style="position:absolute;left:53%;right:18px;top:34px;height:5px;background:rgba(90,78,58,.18);border-radius:2px;"></div>
      </div>
      <!-- dim scrim -->
      <div style="position:absolute;inset:0;background:rgba(26,30,20,.62);backdrop-filter:blur(2px);"></div>

      <!-- status bar (light) -->
      <div style="position:relative;display:flex;align-items:center;justify-content:space-between;padding:16px 30px 4px;color:#f2ede2;font-weight:600;font-size:15px;letter-spacing:.3px;">
        <span>7:15</span>
        <div style="display:flex;align-items:center;gap:7px;">
          <div style="display:flex;align-items:flex-end;gap:2px;height:11px;">
            <div style="width:3px;height:5px;background:#f2ede2;border-radius:1px;"></div>
            <div style="width:3px;height:7px;background:#f2ede2;border-radius:1px;"></div>
            <div style="width:3px;height:9px;background:#f2ede2;border-radius:1px;"></div>
            <div style="width:3px;height:11px;background:#f2ede2;border-radius:1px;"></div>
          </div>
          <div style="width:16px;height:11px;border:1.5px solid #f2ede2;border-radius:3px;position:relative;padding:1.5px;"><div style="width:70%;height:100%;background:#f2ede2;border-radius:1px;"></div><div style="position:absolute;right:-3px;top:3px;width:2px;height:4px;background:#f2ede2;border-radius:0 1px 1px 0;"></div></div>
        </div>
      </div>

      <!-- center verifying block -->
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;">
        <!-- sage pulse ring -->
        <div style="position:relative;width:96px;height:96px;display:flex;align-items:center;justify-content:center;">
          <div style="position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(122,141,96,.5),rgba(122,141,96,0) 70%);animation:cairnPulse 1.8s ease-in-out infinite;"></div>
          <div style="position:absolute;inset:16px;border-radius:50%;border:2px solid rgba(178,196,150,.55);animation:cairnPulse 1.8s ease-in-out infinite;animation-delay:.3s;"></div>
          <!-- small cairn mark -->
          <div style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;">
            <div style="width:14px;height:7px;border-radius:48% 52% 45% 55%/60% 58% 42% 40%;background:#c2cdae;margin-bottom:-1px;"></div>
            <div style="width:22px;height:8px;border-radius:48% 52% 45% 55%/60% 58% 42% 40%;background:#a9b78e;margin-bottom:-1px;"></div>
            <div style="width:30px;height:9px;border-radius:48% 52% 45% 55%/60% 58% 42% 40%;background:#93a473;"></div>
          </div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:'Zilla Slab',serif;font-weight:600;font-size:24px;color:#f4f0e6;">Verifying…</div>
          <div style="font-size:13px;color:#c8d0b6;margin-top:6px;">Checking your proof for “Read 20 pages”</div>
        </div>
      </div>

      <div style="position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:126px;height:5px;border-radius:3px;background:rgba(244,240,230,.4);"></div>
    </div>
  </div>
  <span style="font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#9c917e;">Verifying</span>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:940}}"></script>
</body>
</html>
